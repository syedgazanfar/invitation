<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amelia & James</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Slab:wght@300;400;700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#FFFFFF;--sec:#F0E8FF;--acc:#9860D8;--par:#D0A8FF;
      --txt:#180828;--hf:'Josefin Slab',sans-serif;--bf:'Josefin Sans',sans-serif;
    }
    body{background:var(--bg);color:var(--txt);font-family:var(--bf);min-height:100vh;overflow-x:hidden;position:relative}

    /* Three.js canvas */
    #crystal-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

    .wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:80px 36px;text-align:center}

    .crystal-badge{
      display:inline-block;width:80px;height:80px;margin-bottom:32px;
      position:relative;opacity:0;
    }
    .crystal-badge svg{width:100%;height:100%}
    .crystal-badge path{stroke:var(--acc);fill:none;stroke-width:1.2}

    .eyebrow{font-size:.65rem;letter-spacing:.45em;text-transform:uppercase;color:var(--acc);margin-bottom:24px;opacity:0}

    .names{font-family:var(--hf);font-size:clamp(2.8rem,8vw,5rem);font-weight:300;
           color:var(--txt);line-height:1;margin-bottom:6px;opacity:0;
           letter-spacing:-.01em}
    .names strong{font-weight:700}
    .amp{font-family:var(--hf);font-size:1.4rem;color:var(--acc);display:block;margin:10px 0;opacity:0}

    .crystal-rule{display:flex;align-items:center;gap:12px;margin:28px auto;max-width:260px;opacity:0}
    .cr-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent)}
    .cr-diamond{
      width:10px;height:10px;background:transparent;border:1.5px solid var(--acc);
      transform:rotate(45deg);flex-shrink:0;
      box-shadow:0 0 8px var(--par);
    }

    .dear{font-family:var(--bf);font-style:italic;color:var(--acc);font-size:1rem;margin-bottom:40px;opacity:0}

    .card{
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.2);
      border-radius:20px;
      padding:44px 40px;
      box-shadow:
        0 0 60px rgba(0,0,0,.2),
        inset 0 1px 0 rgba(255,255,255,.3),
        0 0 0 1px rgba(255,255,255,.06);
      opacity:0;
    }
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;text-align:left}
    .full{grid-column:1/-1}
    .lbl{font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:600;margin-bottom:5px}
    .val{font-family:var(--hf);font-size:1.05rem;color:var(--txt);font-weight:300}
    .det-sep{grid-column:1/-1;height:1px;background:rgba(255,255,255,.1);margin:4px 0}
    .msg{margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);
         font-family:var(--bf);font-style:italic;font-size:.95rem;line-height:1.75;
         color:var(--txt);text-align:center;opacity:.85}

    @media(max-width:520px){.grid{grid-template-columns:1fr}.card{padding:32px 20px}.wrap{padding:56px 16px}}
  </style>
</head>
<body>
<canvas id="crystal-canvas"></canvas>
<div class="wrap">
  <div class="crystal-badge" id="e-badge">
    <svg viewBox="0 0 80 80">
      <!-- Crystal / diamond shape -->
      <polygon points="40,4 72,24 72,56 40,76 8,56 8,24"/>
      <polygon points="40,4 56,24 40,36 24,24"/>
      <line x1="40" y1="36" x2="40" y2="76"/>
      <line x1="8" y1="56" x2="72" y2="56"/>
      <line x1="8" y1="24" x2="40" y2="36"/>
      <line x1="72" y1="24" x2="40" y2="36"/>
    </svg>
  </div>

  <p class="eyebrow" id="e-eye">Crystal &nbsp;·&nbsp; Luxury &nbsp;·&nbsp; Wedding</p>
  <div class="names" id="e-bride"><strong>Amelia</strong></div>
  <div class="amp" id="e-amp">&amp;</div>
  <div class="names" id="e-groom"><strong>James</strong></div>
  <div class="crystal-rule" id="e-rule">
    <div class="cr-line"></div><div class="cr-diamond"></div><div class="cr-line"></div>
  </div>
  <p class="dear" id="e-dear">Dear Distinguished Guest,</p>
  <div class="card" id="e-card">
    <div class="grid">
      <div><div class="lbl">Date</div><div class="val">Saturday, June 14, 2026</div></div>
      <div><div class="lbl">Time</div><div class="val">4:00 PM</div></div>
      <div class="det-sep"></div>
      <div class="full"><div class="lbl">Venue</div><div class="val">The Grand Pavilion</div></div>
      <div class="full"><div class="lbl">Location</div><div class="val">123 Garden Lane, London, United Kingdom</div></div>
    </div>
    <div class="msg">"Your presence is the greatest gift we could ask for. We cannot wait to celebrate with you."</div>
  </div>
</div>

<script type="module">
// Three.js particle field
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js';

const canvas=document.getElementById('crystal-canvas');
const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,1000);
camera.position.z=5;

// Crystal particles
const geo=new THREE.BufferGeometry();
const count=800;
const pos=new Float32Array(count*3);
for(let i=0;i<count;i++){
  pos[i*3]=(Math.random()-.5)*20;
  pos[i*3+1]=(Math.random()-.5)*20;
  pos[i*3+2]=(Math.random()-.5)*10;
}
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
const mat=new THREE.PointsMaterial({
  size:.04,color:'#D0A8FF',transparent:true,opacity:.6,
  blending:THREE.AdditiveBlending,depthWrite:false
});
scene.add(new THREE.Points(geo,mat));

let frame=0;
(function animate(){
  requestAnimationFrame(animate);
  frame++;
  scene.rotation.y=frame*.0003;
  scene.rotation.x=Math.sin(frame*.0001)*.1;
  renderer.render(scene,camera);
})();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// Reveal content after particles start
var tl=gsap.timeline({defaults:{ease:'power3.out'}});
tl.to('#e-badge',{opacity:1,rotation:0,duration:.8,from:{rotation:-30}},0.3)
  .to('#e-eye',  {opacity:1,y:0,duration:.7,from:{y:20}},0.7)
  .to('#e-bride',{opacity:1,y:0,duration:.8,from:{y:40}},0.9)
  .to('#e-amp',  {opacity:1,duration:.5},1.3)
  .to('#e-groom',{opacity:1,y:0,duration:.8,from:{y:40}},1.4)
  .to('#e-rule', {opacity:1,duration:.6},1.8)
  .to('#e-dear', {opacity:1,y:0,duration:.6,from:{y:16}},2)
  .to('#e-card', {opacity:1,y:0,duration:.9,from:{y:30}},2.2);
</script>
</body>
</html>
