<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amelia & James — Wedding Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <!-- Typed.js -->
  <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --pri:#FFFDF7;--sec:#E8C98C;--acc:#B8860B;
      --txt:#3A2A06;--hf:'Cormorant Garamond',Georgia,serif;
      --bf:'Open Sans',system-ui,sans-serif;
    }
    body{background:var(--pri);color:var(--txt);font-family:var(--bf);min-height:100vh;overflow-x:hidden;
      background-image:radial-gradient(circle at 20% 80%,#E8C98C40 0%,transparent 50%),
                       radial-gradient(circle at 80% 20%,#E8C98C30 0%,transparent 50%);
    }
    .wrap{max-width:640px;margin:0 auto;padding:80px 36px;text-align:center}
    .eyebrow{font-size:.72rem;letter-spacing:.4em;text-transform:uppercase;color:var(--acc);margin-bottom:36px;opacity:0}
    .names-stage{margin-bottom:14px;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .bride-typed,
    .groom-typed{font-family:var(--hf);font-size:clamp(2.2rem,7vw,4rem);font-weight:300;color:var(--txt);display:block;line-height:1.1}
    .amp-word{font-family:var(--hf);font-size:clamp(1rem,3vw,1.5rem);font-style:italic;color:var(--acc);display:block;margin:8px 0;opacity:0}
    .typed-cursor{color:var(--acc)}
    .rule{display:flex;align-items:center;gap:14px;margin:36px auto;max-width:260px;opacity:0}
    .rule-line{flex:1;height:1px;background:var(--sec)}
    .rule-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);flex-shrink:0}
    .dear{font-family:var(--hf);font-style:italic;font-size:1.1rem;color:var(--acc);margin-bottom:36px;opacity:0}
    .card{background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-radius:12px;padding:44px 40px;
          box-shadow:0 8px 60px rgba(0,0,0,.08);opacity:0}
    .details-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
    .det-full{grid-column:1/-1}
    .lbl{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--acc);font-weight:600;margin-bottom:6px}
    .val{font-family:var(--hf);font-size:1.15rem;color:var(--txt);line-height:1.3}
    .msg{margin-top:28px;padding-top:24px;border-top:1px solid var(--sec);font-family:var(--hf);font-style:italic;font-size:1rem;line-height:1.7;color:var(--txt)}
    @media(max-width:480px){.details-grid{grid-template-columns:1fr}.wrap{padding:56px 20px}.card{padding:28px 20px}}
  </style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow" id="eyebrow">— With Great Joy —</p>

  <div class="names-stage">
    <span class="bride-typed" id="bride-el"></span>
    <span class="amp-word" id="amp">&amp;</span>
    <span class="groom-typed" id="groom-el"></span>
  </div>

  <div class="rule" id="rule">
    <div class="rule-line"></div><div class="rule-dot"></div><div class="rule-line"></div>
  </div>

  <p class="dear" id="dear">Dear Distinguished Guest,</p>

  <div class="card" id="card">
    <div class="details-grid">
      <div>
        <div class="lbl">Date</div>
        <div class="val">Saturday, June 14, 2026</div>
      </div>
      <div>
        <div class="lbl">Time</div>
        <div class="val">4:00 PM</div>
      </div>
      <div class="det-full">
        <div class="lbl">Venue</div>
        <div class="val">The Grand Pavilion</div>
      </div>
      <div class="det-full">
        <div class="lbl">Location</div>
        <div class="val">123 Garden Lane, London, United Kingdom</div>
      </div>
    </div>
    <div class="msg">"Your presence is the greatest gift we could ask for. We cannot wait to celebrate with you."</div>
  </div>
</div>

<script>
(function(){
  var tl=gsap.timeline({defaults:{ease:'power3.out'}});
  tl.to('#eyebrow',{opacity:1,y:0,duration:.8,from:{opacity:0,y:20}},0.2)
    .to('#amp',{opacity:1,duration:.5},0.8);

  // Type bride name
  setTimeout(function(){
    var brideTyped=new Typed('#bride-el',{
      strings:['Amelia'],typeSpeed:90,showCursor:false,
      onComplete:function(){
        // Type groom name after bride
        new Typed('#groom-el',{
          strings:['James'],typeSpeed:90,showCursor:true,
          onComplete:function(){
            gsap.to(['#rule','#dear','#card'],{
              opacity:1,y:0,stagger:.2,duration:.9,
              from:{opacity:0,y:24}
            });
          }
        });
      }
    });
  },600);
})();
</script>
</body>
</html>
