<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amelia & James — Wedding Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --pri:#FFFDF8;--sec:#F0E0C0;--acc:#A87840;--lace:#E8D0A8;
      --txt:#3A2A10;--hf:'Cormorant Garamond',Georgia,serif;--bf:'Montserrat',system-ui,sans-serif;
    }
    body{background:var(--pri);color:var(--txt);font-family:var(--bf);min-height:100vh;overflow-x:hidden;
         background-image:
           radial-gradient(circle at 15% 85%,var(--lace) 0%,transparent 40%),
           radial-gradient(circle at 85% 15%,var(--lace) 0%,transparent 40%);
    }

    /* Lace clip-path curtain */
    .curtain{
      position:fixed;inset:0;
      background:var(--acc);
      clip-path:polygon(0 0,100% 0,100% 100%,0 100%);
      z-index:100;pointer-events:none;
    }

    .wrap{max-width:680px;margin:0 auto;padding:70px 36px;text-align:center;position:relative;z-index:1}

    /* Lace border simulation with repeating SVG background */
    .lace-frame{
      position:relative;padding:52px 48px;
      background:#fff;
      border:1px solid var(--lace);
      box-shadow:inset 0 0 0 8px var(--pri),inset 0 0 0 10px var(--lace),
                 0 8px 60px rgba(0,0,0,.08);
    }
    .lace-corner{position:absolute;width:80px;height:80px;opacity:.6}
    .lace-corner.tl{top:8px;left:8px}
    .lace-corner.tr{top:8px;right:8px;transform:scaleX(-1)}
    .lace-corner.bl{bottom:8px;left:8px;transform:scaleY(-1)}
    .lace-corner.br{bottom:8px;right:8px;transform:scale(-1)}
    .lace-corner svg path{stroke:var(--acc);fill:none;stroke-width:1}

    .eyebrow{font-size:.68rem;letter-spacing:.4em;text-transform:uppercase;color:var(--acc);margin-bottom:28px;opacity:0}
    .names{font-family:var(--hf);font-size:clamp(2.2rem,6.5vw,4rem);font-weight:300;
           color:var(--txt);line-height:1.05;margin-bottom:6px;opacity:0}
    .names strong{font-weight:700}
    .amp{font-family:var(--hf);font-style:italic;font-size:1.4rem;color:var(--acc);
         display:block;margin:8px 0;opacity:0}
    .lace-rule{display:flex;align-items:center;gap:10px;margin:24px auto;max-width:240px;opacity:0}
    .lace-line{flex:1;height:1px;background:var(--lace)}
    .lace-gem{width:6px;height:6px;border:1px solid var(--acc);transform:rotate(45deg);flex-shrink:0}

    .dear{font-family:var(--hf);font-style:italic;color:var(--acc);font-size:1.05rem;margin-bottom:32px;opacity:0}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;text-align:left;opacity:0}
    .full{grid-column:1/-1}
    .lbl{font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:600;margin-bottom:5px}
    .val{font-family:var(--hf);font-size:1.05rem;color:var(--txt)}
    .det-div{height:1px;background:var(--lace);grid-column:1/-1;margin:4px 0}
    .msg{margin-top:28px;padding:20px 24px;background:var(--pri);border:1px solid var(--lace);
         font-family:var(--hf);font-style:italic;font-size:.95rem;line-height:1.7;opacity:0;text-align:center}

    @media(max-width:520px){.grid{grid-template-columns:1fr}.lace-frame{padding:36px 24px}.wrap{padding:48px 16px}}
  </style>
</head>
<body>
<div class="curtain" id="curtain"></div>

<div class="wrap">
  <div class="lace-frame">
    <!-- Lace corner ornaments -->
    <div class="lace-corner tl"><svg viewBox="0 0 80 80"><path d="M5,75 Q5,5 75,5 M5,55 Q20,15 55,5 M15,75 Q15,25 65,5 M25,75 Q25,30 70,10"/></svg></div>
    <div class="lace-corner tr"><svg viewBox="0 0 80 80"><path d="M5,75 Q5,5 75,5 M5,55 Q20,15 55,5 M15,75 Q15,25 65,5 M25,75 Q25,30 70,10"/></svg></div>
    <div class="lace-corner bl"><svg viewBox="0 0 80 80"><path d="M5,75 Q5,5 75,5 M5,55 Q20,15 55,5 M15,75 Q15,25 65,5 M25,75 Q25,30 70,10"/></svg></div>
    <div class="lace-corner br"><svg viewBox="0 0 80 80"><path d="M5,75 Q5,5 75,5 M5,55 Q20,15 55,5 M15,75 Q15,25 65,5 M25,75 Q25,30 70,10"/></svg></div>

    <p class="eyebrow" id="e1">Together with their families</p>
    <div class="names" id="e2"><strong>Amelia</strong></div>
    <div class="amp" id="e3">&amp;</div>
    <div class="names" id="e4"><strong>James</strong></div>
    <div class="lace-rule" id="e5">
      <div class="lace-line"></div><div class="lace-gem"></div><div class="lace-line"></div>
    </div>
    <p class="dear" id="e6">Dear Distinguished Guest,</p>
    <div class="grid" id="e7">
      <div><div class="lbl">Date</div><div class="val">Saturday, June 14, 2026</div></div>
      <div><div class="lbl">Time</div><div class="val">4:00 PM</div></div>
      <div class="det-div"></div>
      <div class="full"><div class="lbl">Venue</div><div class="val">The Grand Pavilion</div></div>
      <div class="full"><div class="lbl">Location</div><div class="val">123 Garden Lane, London, United Kingdom</div></div>
    </div>
    <div class="msg" id="e8">"Your presence is the greatest gift we could ask for. We cannot wait to celebrate with you."</div>
  </div>
</div>

<script>
// Curtain lifts up, then content fades in
var tl=anime.timeline({easing:'easeInOutQuart'});
tl.add({
  targets:'#curtain',
  clipPath:['polygon(0 0,100% 0,100% 100%,0 100%)','polygon(0 0,100% 0,100% 0%,0 0%)'],
  duration:1000,
  delay:200
}).add({
  targets:['#e1','#e2','#e3','#e4','#e5','#e6','#e7','#e8'],
  opacity:[0,1],
  translateY:[20,0],
  delay:anime.stagger(100),
  duration:600,
  easing:'easeOutExpo'
},'-=200');
</script>
</body>
</html>
